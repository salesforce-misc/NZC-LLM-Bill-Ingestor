<template>
  <div class="ai-glass-card">
    <!-- Header with centered title -->
    <div class="ai-header">
      <div class="ai-avatar">
        <svg viewBox="0 0 64 64" class="ai-hero-icon" aria-hidden="true">
          <g>
            <path
              class="ai-tree-trunk"
              d="M 30 58 L 30 42 C 30 40 32 40 32 42 L 32 58 Z"
            />
            <circle class="ai-tree-leaf-main" cx="31" cy="28" r="14" />
            <circle class="ai-tree-leaf-left" cx="22" cy="34" r="10" />
            <circle class="ai-tree-leaf-right" cx="40" cy="34" r="10" />
          </g>
        </svg>
      </div>
      <div class="ai-title">Bill Importer</div>
    </div>

    <!-- File upload and selection section -->

    <lightning-tabset active-tab-value="upload" variant="scoped">
      <lightning-tab label="Upload New File" value="upload">
        <div class="ai-upload-wrapper ai-p-around">
          <lightning-file-upload
            label="Upload Image or PDF"
            name="uploadFile"
            multiple="false"
            accept=".jpg,.jpeg,.png,.pdf"
            record-id={recordId}
            onuploadfinished={fileUploadHandler}
          >
          </lightning-file-upload>
        </div>
      </lightning-tab>
      <lightning-tab label="Select Existing File" value="existing">
        <div class="ai-p-around">
          <template lwc:if={hasFiles}>
            <lightning-combobox
              name="existingFiles"
              label="Choose a file from this record"
              value={uploadedFileId}
              placeholder="Select a file..."
              options={fileOptions}
              onchange={handleFileSelectionChange}
            >
            </lightning-combobox>
          </template>
          <template lwc:else>
            <div class="ai-empty-files">
              No existing files found on this record.
            </div>
          </template>
        </div>
      </lightning-tab>
    </lightning-tabset>

    <!-- Selected file display remains the same -->
    <template lwc:if={uploadedFileName}>
      <div class="ai-uploaded-file ai-m-horizontal">
        <lightning-icon
          icon-name="doctype:image"
          size="x-small"
        ></lightning-icon>
        <span class="ai-uploaded-file-name">{uploadedFileName}</span>
      </div>
    </template>

    <!-- Analyze button -->
    <div class="ai-analyze-btn-wrapper ai-m-top">
      <lightning-button
        variant="brand"
        label="Analyze Selected File"
        icon-name="utility:einstein"
        class="ai-analyze-btn"
        disabled={disableAnalyzeButton}
        onclick={handleAnalyzeFiles}
      >
      </lightning-button>
    </div>

    <!-- Loading and Error sections remain the same -->
    <template lwc:if={isLoading}>
      <div class="ai-loading">
        <div class="ai-loader"></div>
        <span class="ai-analyzing">Analyzing with AI…</span>
      </div>
    </template>
    <template lwc:if={errorMessage}>
      <div class="ai-error">
        <lightning-icon
          icon-name="utility:error"
          size="x-small"
        ></lightning-icon>
        <span>{errorMessage}</span>
      </div>
    </template>

    <!-- NEW: Updated AI Analysis Result Section -->
    <template lwc:if={aiResult}>
      <div class="ai-result">
        <!-- Display single object result -->
        <template lwc:if={isSingleResult}>
          <div class="ai-result-single">
            <h3 class="ai-result-title">
              <lightning-icon
                icon-name="utility:bot"
                size="small"
              ></lightning-icon>
              Analysis Result
            </h3>
            <table class="ai-result-table ai-table">
              <tbody>
                <template for:each={resultData} for:item="item">
                  <tr key={item.id}>
                    <th scope="row" class="ai-result-key">{item.label}</th>
                    <td class="ai-result-value">{item.value}</td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>

        <!-- Display array of objects result using lightning-datatable -->
        <template lwc:elseif={isArrayResult}>
          <div class="ai-result-array">
            <h3 class="ai-result-title">
              <lightning-icon
                icon-name="utility:bot"
                size="small"
              ></lightning-icon>
              Analysis Results ({arrayItemCount} items found)
            </h3>
            <div class="ai-result-datatable">
              <p class="ai-table-hint">
                💡 Click the blue action button (⋮) and select "View Details" to
                see full record information
              </p>
              <lightning-datatable
                data={resultData}
                columns={tableColumns}
                key-field="Id"
                hide-checkbox-column="true"
                show-row-number-column="false"
                resize-column-disabled="true"
                sorted-direction={sortedDirection}
                sorted-by={sortedBy}
                onsort={handleSort}
                class="ai-datatable"
                onrowaction={handleRowAction}
              >
              </lightning-datatable>
            </div>

            <!-- Dedicated Detail Component -->
            <c-energy-record-detail
              record-data={selectedRowData}
              show-component={showDetailView}
              onclosedetail={handleCloseDetails}
            >
            </c-energy-record-detail>
          </div>
        </template>

        <!-- Otherwise, fall back to the original rich text display -->
        <template lwc:else>
          <div class="ai-result-raw">
            <lightning-icon
              icon-name="utility:bot"
              size="small"
            ></lightning-icon>
            <lightning-formatted-rich-text
              value={aiResult}
            ></lightning-formatted-rich-text>
          </div>
        </template>
      </div>

      <!-- Actions section with new Create Records button -->
      <div class="ai-actions-group">
        <lightning-button-group>
          <lightning-button
            class="ai-action-btn"
            variant="success"
            label="Create Energy Records"
            icon-name="utility:add"
            onclick={handleCreateRecords}
            disabled={disableCreateRecordsButton}
          >
          </lightning-button>
          <lightning-button
            class="ai-action-btn"
            variant="neutral"
            label="Copy"
            icon-name="utility:copy"
            onclick={handleCopyToClipboard}
          ></lightning-button>
        </lightning-button-group>

        <!-- Loading indicator for record creation -->
        <template lwc:if={isCreatingRecords}>
          <div class="ai-loading ai-m-top-small">
            <div class="ai-loader-small"></div>
            <span class="ai-analyzing">Creating energy use records...</span>
          </div>
        </template>

        <!-- Success message showing created record count -->
        <template lwc:if={createdRecordIds.length}>
          <div class="ai-success ai-m-top-small">
            <lightning-icon
              icon-name="utility:success"
              size="x-small"
            ></lightning-icon>
            <span
              >Successfully created {createdRecordIds.length} Energy Use
              record{createdRecordIds.length}{pluralSuffix}!</span
            >
          </div>
        </template>

        <template lwc:if={showActionToast}>
          <div class="ai-action-toast">{actionToastMessage}</div>
        </template>
      </div>
    </template>
  </div>
</template>
